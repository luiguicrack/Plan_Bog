<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripción — Plan BOG</title>

    <link rel="icon" href="img/mini.png" type="image/png">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/suscripcion.css">

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- =========================
         SUSCRIPCIÓN
    ========================= -->

    <section class="suscripcion">

        <div class="suscripcion-container">

            <!-- INFO -->
            <div class="suscripcion-info">

                <!-- TOP -->
                <div class="top-actions">

                    <a href="../index.html" class="back-home" data-key="backHome">
                        ← VOLVER AL INICIO
                    </a>

                    <button id="language-toggle">
                        ESP
                    </button>

                </div>

                <!-- TAG -->
                <span class="premium-tag" data-key="premiumTag">
                    PREMIUM PLAN BOG
                </span>

                <h1 data-key="premiumTitle">
                    SUSCRÍBETE Y VIVE
                    <br>
                    BOGOTÁ SIN LÍMITES
                </h1>

                <p data-key="premiumText">
                    Accede a descuentos, eventos exclusivos,
                    recomendaciones inteligentes y experiencias
                    únicas por toda la ciudad.
                </p>

                <div class="price">

                    <span class="currency">$</span>

                    <span class="amount">10.000</span>

                    <span class="cop" data-key="copText">
                        COP / MES
                    </span>

                </div>

            </div>

            <!-- TARJETA -->
            <div class="payment-card">

                <!-- HEADER -->
                <div class="card-header">

                    <h2 data-key="paymentTitle">
                        MÉTODO DE PAGO
                    </h2>

                    <img src="../img/mastercard.png" alt="">

                </div>


                <!-- MÉTODOS -->
                <div class="payment-methods">

                    <button class="method-btn active" data-method="card">
                        💳 <span data-key="cardMethod">TARJETA</span>
                    </button>

                    <button class="method-btn" data-method="pse">
                        🏦 PSE
                    </button>

                </div>


                <!-- TARJETA -->
                <div class="payment-content active" id="card-payment">

                    <div class="input-group">

                        <label data-key="cardNumber">
                            Número de tarjeta
                        </label>

                        <input 
                            type="text"
                            id="card-number"
                            maxlength="19"
                            placeholder="1234 5678 9012 3456"
                        >

                    </div>


                    <div class="card-row">

                        <div class="input-group">

                            <label>CVV</label>

                            <input 
                                type="password"
                                maxlength="3"
                                placeholder="123"
                            >

                        </div>

                        <div class="input-group">

                            <label data-key="expiry">
                                Expira
                            </label>

                            <input 
                                type="text"
                                maxlength="5"
                                placeholder="12/28"
                            >

                        </div>

                    </div>


                    <div class="input-group">

                        <label data-key="holderName">
                            Nombre del titular
                        </label>

                        <input 
                            type="text"
                            placeholder="Juan Pérez"
                        >

                    </div>

                </div>


                <!-- PSE -->
                <div class="payment-content" id="pse-payment">

                    <div class="input-group">

                        <label data-key="bankLabel">
                            Banco
                        </label>

                        <select>

                            <option>Bancolombia</option>
                            <option>Davivienda</option>
                            <option>Banco de Bogotá</option>
                            <option>BBVA</option>
                            <option>Nequi</option>

                        </select>

                    </div>


                    <div class="input-group">

                        <label data-key="documentLabel">
                            Documento
                        </label>

                        <input 
                            type="text"
                            placeholder="123456789"
                        >

                    </div>

                </div>


                <!-- BOTÓN -->
                <button class="pay-btn" id="pay-btn" data-key="payBtn">
                    PAGAR AHORA
                </button>


                <!-- MENSAJE -->
                <div class="success-message" id="success-message">

                    <span>✔</span>

                    <p data-key="successText">
                        Pago procesado correctamente
                    </p>

                </div>

            </div>

        </div>

    </section>

    <!-- JS -->
    <script src="../js/suscripcion.js"></script>

</body>
</html>
